<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarTiers Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root {
            --bg: #05060a; --panel: #0d0f17; --border: #1e232e;
            --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32;
            --accent: #58a6ff; --discord: #5865F2;
        }

        /* PARTICLE BACKGROUND SYSTEM */
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #05060a 100%);
            z-index: -2;
        }

        /* Animated Stars/Particles */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: moveParticles 100s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveParticles {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* TOP NAVIGATION */
        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1200px; margin: 0 auto 30px; gap: 30px; }
        .brand-section { display: flex; flex-direction: column; gap: 8px; min-width: 350px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .main-logo { width: 60px; height: 60px; border-radius: 10px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(88,166,255,0.3)); }
        
        .server-ip { 
            font-size: 11px; font-weight: 800; color: var(--accent); 
            letter-spacing: 1.5px; text-transform: uppercase; margin-top: 5px;
            animation: glowText 2s ease-in-out infinite alternate;
        }

        @keyframes glowText {
            from { text-shadow: 0 0 5px rgba(88,166,255,0.2); }
            to { text-shadow: 0 0 15px rgba(88,166,255,0.6); }
        }

        /* SEARCH BOX */
        .search-box { flex: 1; position: relative; }
        .search-box input { 
            width: 100%; background: var(--panel); border: 1px solid var(--border); 
            padding: 14px 20px; border-radius: 12px; color: white; outline: none; 
            transition: 0.3s; font-size: 14px; backdrop-filter: blur(5px);
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(88,166,255,0.2); }
        
        .discord-btn { background: var(--discord); color: white; text-decoration: none; padding: 14px 25px; border-radius: 12px; font-weight: 900; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3); }
        .discord-btn:hover { background: #4752c4; transform: scale(1.05); }

        /* LEADERBOARD TABLE */
        .lb-container { 
            max-width: 1200px; margin: 0 auto; background: rgba(13, 15, 23, 0.8); 
            border: 1px solid var(--border); border-radius: 16px; overflow: hidden; 
            backdrop-filter: blur(10px);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.4); padding: 20px; text-align: left; font-size: 11px; color: #505a73; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* SHINE AND HOVER EFFECTS */
        tr { 
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, background 0.3s ease; 
        }

        /* The Shine Effect Overlay */
        tr::after {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
            pointer-events: none;
        }

        tr:hover::after {
            left: 100%;
            transition: 0.6s;
        }

        tr:hover { 
            background: rgba(255,255,255,0.06); 
            transform: scale(1.015) translateX(-8px); 
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Rank-specific intense glows */
        tr:has(.r1):hover { box-shadow: 0 0 30px rgba(255, 204, 0, 0.3); }
        tr:has(.r2):hover { box-shadow: 0 0 30px rgba(224, 224, 224, 0.2); }
        tr:has(.r3):hover { box-shadow: 0 0 30px rgba(205, 127, 50, 0.2); }
        tr:not(:has(.r1)):not(:has(.r2)):not(:has(.r3)):hover { box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); }
        
        .rank-col { width: 60px; text-align: center; font-weight: 900; font-size: 20px; }
        .r1 { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .r2 { color: var(--silver); text-shadow: 0 0 10px rgba(224,224,224,0.5); }
        .r3 { color: var(--bronze); text-shadow: 0 0 10px rgba(205,127,50,0.5); }
        
        .p-info { display: flex; align-items: center; gap: 14px; }
        .p-head { width: 38px; height: 38px; border-radius: 6px; image-rendering: pixelated; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .p-name { font-weight: 800; font-size: 15px; letter-spacing: 0.3px; }

        .pts-container { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
        .pts-val { font-weight: 900; font-size: 18px; color: var(--accent); }
        .pts-lbl { font-size: 10px; color: #505a73; text-transform: uppercase; font-weight: 700; }

        .tier-list { display: flex; gap: 6px; flex-wrap: wrap; }
        .t-badge { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; border: 1px solid #222; transition: 0.2s; }
        .active-t:hover { border-color: var(--accent); transform: translateY(-2px); }
        .t-badge img { width: 16px; height: 16px; image-rendering: pixelated; }
        .active-t { border-color: #333; color: #fff; }
        .dim-t { opacity: 0.1; filter: grayscale(1); }

        /* FOOTER STRIP */
        .footer-strip { 
            max-width: 1200px; margin: 40px auto 20px; padding: 25px; 
            border-top: 1px solid var(--border); display: flex; 
            justify-content: space-between; font-size: 12px; color: #505a73; 
            font-weight: 600; letter-spacing: 1px;
        }
        .footer-strip b { color: var(--accent); }
    </style>
</head>
<body>

    <div class="particles"></div>

        data.forEach(p => {
            let total = 0;
            Object.keys(icons).forEach(k => { if (p[k]) total += ptsMap[p[k]] || 0; });
            p.pts = total;
        });
        data.sort((a, b) => b.pts - a.pts);
        data.forEach((p, index) => { p.globalRank = index + 1; });

        function filterLb() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('lbTable');
            let filtered = data.filter(p => p.n.toLowerCase().includes(query));
            body.innerHTML = filtered.map(p => {
                const pos = p.globalRank;
                const rClass = pos === 1 ? 'r1' : pos === 2 ? 'r2' : pos === 3 ? 'r3' : '';
                return `
                    <tr>
                        <td class="rank-col ${rClass}">${pos}</td>
                        <td>
                            <div class="p-info">
                                <img src="https://mineskin.eu/helm/${p.n}/40" class="p-head" onerror="this.src='https://mineskin.eu/helm/steve/40'">

                                        <img src="${icons[k]}"> ${p[k] || '?'}
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }
        filterLb();
    </script>
</body>
